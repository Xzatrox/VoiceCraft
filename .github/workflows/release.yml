name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Package for Windows
        run: npm run electron:build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List release directory
        run: dir release
        shell: cmd

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: release/*
          retention-days: 5

      - name: Upload Windows Release Assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release/*.exe
            release/*.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate macOS icon
        run: |
          cd build
          mkdir -p icon.iconset
          sips -z 16 16     icon-512.png --out icon.iconset/icon_16x16.png
          sips -z 32 32     icon-512.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32     icon-512.png --out icon.iconset/icon_32x32.png
          sips -z 64 64     icon-512.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128   icon-512.png --out icon.iconset/icon_128x128.png
          sips -z 256 256   icon-512.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256   icon-512.png --out icon.iconset/icon_256x256.png
          sips -z 512 512   icon-512.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512   icon-512.png --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 icon-512.png --out icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o icon.icns
          rm -rf icon.iconset

      - name: Build application
        run: npm run build

      - name: Package for macOS (arm64)
        run: npx electron-builder --mac --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package for macOS (x64)
        run: npx electron-builder --mac --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List release directory
        run: ls -la release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: release/*
          retention-days: 5

      - name: Upload macOS Release Assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release/*.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
